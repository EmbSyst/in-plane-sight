<!doctype html>
<!-- index.html - Einstiegspunkt für die Touch-UI. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>In Plane Sight</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">In Plane Sight</div>
      <div class="status" id="status">Connecting…</div>
    </header>

    <nav class="tabbar">
      <button type="button" class="tab active" id="tabAircrafts">Aircrafts</button>
      <button type="button" class="tab" id="tabGlobeControl">Globe Control</button>
    </nav>

    <main class="main" id="viewAircrafts">
      <section class="hint">
        Tap an aircraft to forward its position (lat/lon) to the Holo Globe.
      </section>
      <section class="details" id="details" aria-live="polite"></section>
      <section class="grid" id="grid"></section>
    </main>

    <main class="main hidden" id="viewGlobeControl">
      <section class="hint">
        Control the display modes and settings of the Holo Globe.
      </section>
      
      <div class="control-group">
        <h3>Display Modes</h3>
        <div class="button-grid">
          <button type="button" class="button" onclick="setGlobeMode(0)">LEDs Off</button>
          <button type="button" class="button" onclick="setGlobeMode(1, [255, 255, 255])">Solid White</button>
          <button type="button" class="button" onclick="setGlobeMode(1, [255, 0, 0])">Solid Red</button>
          <button type="button" class="button" onclick="setRandomPlane()">Random Plane Spot</button>
          <button type="button" class="button" onclick="setGlobeMode(3)">Rainbow</button>
        </div>
      </div>
      
      <div class="control-group">
        <h3>Motor Control</h3>
        <div class="button-grid">
          <button type="button" class="button" onclick="setMotorRpm(0)">OFF</button>
          <button type="button" class="button" onclick="setMotorRpm(200)">200</button>
          <button type="button" class="button" onclick="setMotorRpm(400)">400</button>
          <button type="button" class="button" onclick="setMotorRpm(600)">600</button>
          <button type="button" class="button" onclick="setMotorRpm(800)">800</button>
          <button type="button" class="button" onclick="setMotorRpm(1000)">1000</button>
        </div>
      </div>
    </main>

    <div class="toast" id="toast" aria-live="polite"></div>

    <script src="/static/app.js?v=2"></script>
  </body>
</html>
